name: Sync to Hugging Face
on:
  push:
    branches:
      - skill_gap_model
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to huggingface
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://nbilmkrim:$HF_TOKEN@huggingface.co/spaces/nbilmkrim/GapSense-API
          git checkout --orphan hf_deploy
          git add -A
          # Configure dummy git user for the commit
          git config --global user.email "bot@gapsense.local"
          git config --global user.name "Deploy Bot"
          git commit -m "Deploy to Hugging Face"
          git push --force space hf_deploy:main
