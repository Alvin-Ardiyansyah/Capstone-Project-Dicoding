name: Sync to Hugging Face
on:
  push:
    branches:
      - skill_gap_model
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python -c "
          from huggingface_hub import HfApi
          import os

          # Initialize API with token
          api = HfApi(token=os.environ.get('HF_TOKEN'))
          
          # Upload entire directory to Space, ignoring unnecessary files
          api.upload_folder(
              folder_path='.',
              repo_id='nbilmkrim/GapSense-API',
              repo_type='space',
              ignore_patterns=[
                  '.git/*', '.github/*', '.venv/*', 'venv/*', 'env/*',
                  '*/__pycache__/*', '*.pyc', '*.pyo', '.env', 'modeling/.env',
                  'Preprocessing data/*.ipynb', 'Preprocessing data/.ipynb_checkpoints/*',
                  'fitur_tambahan/*', '.DS_Store', 'Thumbs.db', '.vscode/*'
              ]
          )
          "
